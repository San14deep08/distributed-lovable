server:
  port: 9030
  servlet.context-path: /intelligence

spring:
  datasource:
    url: jdbc:postgresql://localhost:9010/lovable-intelligence-db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  ai:
    model.chat: anthropic
    anthropic:
      api-key: ${AI_API_KEY:dummy-key}
      chat:
        options:
          model: ${AI_MODEL:claude-opus-4-8}
          max-tokens: 16000

---

spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:postgresql://pgvector.lovable-core.svc.cluster.local:5432/intelligence_db
    username: intelligence_user
    password: ${DB_PASSWORD}

ai:
    anthropic:
      api-key: ${AI_API_KEY}
      chat:
        options:
          model: ${AI_MODEL:claude-opus-4-8}
          max-tokens: 16000
---

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/lovable-intelligence-db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  ai:
    anthropic:
      api-key: ${AI_API_KEY:dummy-key}
      chat:
        options:
          model: ${AI_MODEL:claude-opus-4-8}
          max-tokens: 16000
